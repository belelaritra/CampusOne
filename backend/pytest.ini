[pytest]
# Django settings module for all tests
DJANGO_SETTINGS_MODULE = campus_portal.settings

# Test discovery
testpaths   = tests
python_files  = test_*.py
python_classes = Test*
python_functions = test_*

# Output verbosity
addopts =
    -v
    --tb=short
    --no-header

# Console log (shown while tests run)
log_cli            = true
log_cli_level      = WARNING
log_cli_format     = %(asctime)s [%(levelname)-8s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

# File log (full DEBUG detail — see tests/logs/all_tests.log)
log_file            = tests/logs/all_tests.log
log_file_level      = DEBUG
log_file_format     = %(asctime)s [%(levelname)-8s] %(name)s: %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S
